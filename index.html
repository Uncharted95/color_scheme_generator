<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Color Scheme Generator</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <main>
            <div class="app">
                <div class="colorGenerator">
                <input type="color" class="colorPicker"/>
                <select name="colors" id="colorSelect">
                    <option value="Monochrome">Monochrome</option>
                    <option value="Monochrome-dark">Monochrome-dark</option>
                    <option value="Monochrome-light">Monochrome-light</option>
                    <option value="Analogic">Analogic</option>
                    <option value="Complement">Complement</option>
                    <option value="Analogic-complement">Analogic-complement</option>
                    <option value="Triad">Triad</option>
                </select>
                <button>Get Color scheme</button>
                </div>
                <div class="colorPalettes">
                    <div class="colorPalette" id="c0"></div>
                    <div class="colorPalette" id="c1"></div>
                    <div class="colorPalette" id="c2"></div>
                    <div class="colorPalette" id="c3"></div>
                    <div class="colorPalette" id="c4"></div>
                </div>

                <div class="hexCodes">
                    <p class="hex" id="h0"></p>
                    <p class="hex" id="h1"></p>
                    <p class="hex" id="h2"></p>
                    <p class="hex" id="h3"></p>
                    <p class="hex" id="h4"></p>
                </div>
            </div>
        </main>

        <script src="script.js"></script>
    </body>
</html>
